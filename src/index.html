<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>RWR Toolbox</title>
        <base href="./" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <style>
            .app-loading {
                position: fixed;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                background: #0f0f12;
                color: #e2e2e2;
                font-family: ui-sans-serif, system-ui, -apple-system,
                    BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                z-index: 9999;
            }

            .app-loading-spinner {
                position: relative;
                width: 56px;
                height: 56px;
            }

            .app-loading-spinner::before,
            .app-loading-spinner::after {
                content: '';
                position: absolute;
                inset: 0;
                border-radius: 50%;
                border: 3px solid transparent;
            }

            .app-loading-spinner::before {
                border-top-color: #6366f1;
                border-right-color: rgba(99, 102, 241, 0.35);
                animation: app-loading-spin 0.9s linear infinite;
            }

            .app-loading-spinner::after {
                inset: 8px;
                border-bottom-color: #a855f7;
                border-left-color: rgba(168, 85, 247, 0.35);
                animation: app-loading-spin 1.2s linear infinite reverse;
            }

            @keyframes app-loading-spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .app-loading-title {
                margin-top: 20px;
                font-size: 17px;
                font-weight: 700;
                letter-spacing: 0.08em;
                color: #f0f0f0;
            }

            .app-loading-sub {
                margin-top: 10px;
                font-size: 12px;
                font-weight: 500;
                color: #888;
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .app-loading-dots {
                display: inline-flex;
                gap: 3px;
            }

            .app-loading-dots span {
                width: 4px;
                height: 4px;
                background: #888;
                border-radius: 50%;
                animation: app-loading-bounce 1.4s infinite ease-in-out both;
            }

            .app-loading-dots span:nth-child(1) {
                animation-delay: -0.32s;
            }

            .app-loading-dots span:nth-child(2) {
                animation-delay: -0.16s;
            }

            @keyframes app-loading-bounce {
                0%,
                80%,
                100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }

        </style>
    </head>
    <body>
        <app-root>
            <div class="app-loading">
                <div class="app-loading-spinner"></div>
                <div class="app-loading-title">RWR TOOLBOX</div>
                <div class="app-loading-sub">
                    Loading
                    <span class="app-loading-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </div>
            </div>
        </app-root>
    </body>
</html>
